name: nvim-tests
on:
  push:
    branches: 
      - '**'
  pull_request:
jobs:
  nvim-tests:
    runs-on: ubuntu-latest
    env:
      ANGST_REPO: ${{ github.workspace }}
      NIXPKGS_ALLOW_UNFREE: 1
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: cp local/config.nix.example local/config.nix
      - name: Cache lazy plugins
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nvim/lazy
          key: lazy-${{ hashFiles('domains/editor/nvim/config/lazy-lock.json') }}
          restore-keys: lazy-
      - name: Link Neovim config
        run: |
          mkdir -p ~/.config
          ln -sfn "$PWD/domains/editor/nvim/config" ~/.config/nvim
      - name: Stage lazy lockfile
        run: |
          mkdir -p ~/.local/share/nvim
          ln -sfn "$PWD/domains/editor/nvim/config/lazy-lock.json" ~/.local/share/nvim/lazy-lock.json
      - name: Install Neovim plugins
        run: |
          nix develop --impure .#safe --command bash -c \
            "cd domains/editor/nvim/config && nvim --headless '+Lazy! sync' +qa"
      - name: Run Neovim adapter tests
        run: |
          nix develop --impure .#safe --command bash -c \
            "cd domains/editor/nvim/config && nvim --headless -u NONE -l tests/adapters/init.lua"
