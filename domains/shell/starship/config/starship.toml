format = """
$username$hostname $nix_shell$env_var$directory $git_branch$git_status$buf$bun$c$cpp$cmake$cobol$crystal$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$fortran$gleam$golang$gradle$haskell$haxe$helm$java$julia$kotlin$lua$maven$meson$mojo$nim$nodejs$ocaml$odin$opa$perl$php$pulumi$python$rlang$raku$ruby$rust$scala$solidity$spack$swift$terraform$typst$vagrant$vlang$zig

"""

add_newline = true

[directory]
format = "[$path]($style)[$read_only]($read_only_style)"
style = "bold #ff7b72"
read_only = " RO"
read_only_style = "bold #ff6e6e"
truncation_length = 3
truncate_to_repo = false

[git_branch]
format = "*[$branch]($style)"
style = "#58a6ff"
symbol = ""

[git_status]
format = ' [\[$all_status$ahead_behind\]]($style) '
style = "#f2b134"
conflicted = "!"
ahead = "+"
behind = "-"
diverged = "+-"
untracked = "?"
stashed = "*"
modified = "~"
staged = "+"
renamed = "r"
deleted = "x"

[username]
format = "[$user]($style)"
style_user = "bold #58a6ff"
style_root = "bold #ff6e6e"
show_always = true

[hostname]
format = "[@$hostname]($style)"
style = "bold #58a6ff"
ssh_only = true

[nix_shell]
format = "[$symbol$name]($style) "
