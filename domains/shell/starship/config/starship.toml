format = """
$directory $git_branch$git_status$all
$character"""

add_newline = true

[directory]
format = "[$path]($style)[$read_only]($read_only_style)"
style = "bold #eeeeee"
read_only = " RO"
read_only_style = "bold #b84a4a"
truncation_length = 3
truncate_to_repo = false

[git_branch]
format = "on [$branch]($style)"
style = "#6e6e5c"
symbol = ""

[git_status]
format = " [$all_status$ahead_behind]($style)"
style = "#c4904a"
conflicted = "!"
ahead = "+"
behind = "-"
diverged = "+-"
untracked = "?"
stashed = "*"
modified = "~"
staged = ">"
renamed = "r"
deleted = "x"

# vimcmd_symbol is ignored when STARSHIP_SHELL=nu; Nushell handles vi mode via
# PROMPT_INDICATOR_VI_INSERT / PROMPT_INDICATOR_VI_NORMAL in env.nu.
[character]
success_symbol = "[>](bold #608f60)"
error_symbol = "[>](bold #b84a4a)"
vimcmd_symbol = "[<](bold #c2c2b0)"

[username]
format = "[$user]($style) "
style_user = "bold #eeeeee"
style_root = "bold #b84a4a"
show_always = false

[hostname]
format = "[@$hostname]($style) "
style = "bold #6e6e5c"
ssh_only = true

[nodejs]
format = "[$symbol($version)]($style) "
symbol = "node "
style = "#6e6e5c"

[python]
format = "[$symbol$version]($style) "
symbol = "py "
style = "#6e6e5c"

[rust]
format = "[$symbol($version)]($style) "
symbol = "rs "
style = "#6e6e5c"

[golang]
format = "[$symbol($version)]($style) "
symbol = "go "
style = "#6e6e5c"

[java]
format = "[$symbol($version)]($style) "
symbol = "java "
style = "#6e6e5c"

[php]
format = "[$symbol($version)]($style) "
symbol = "php "
style = "#6e6e5c"

[ruby]
format = "[$symbol($version)]($style) "
symbol = "rb "
style = "#6e6e5c"

[nix_shell]
format = "[$symbol$state]($style) "
symbol = "nix "
style = "#6e6e5c"

[docker_context]
format = "[$symbol$context]($style) "
symbol = "docker "
style = "#6e6e5c"

[package]
format = "[$symbol$version]($style) "
symbol = "pkg "
style = "#6e6e5c"
