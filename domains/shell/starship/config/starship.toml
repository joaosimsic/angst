format = """
$username$hostname $env_var$directory $git_branch$git_status$nix_shell$buf$bun$c$cpp$cmake$cobol$crystal$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$fortran$gleam$golang$gradle$haskell$haxe$helm$java$julia$kotlin$lua$maven$meson$mojo$nim$nodejs$ocaml$odin$opa$perl$php$pulumi$python$r$raku$ruby$rust$scala$solidity$spack$sphinx$sql$svelte$swift$terraform$typst$vagrant$vala$verilog$vlang$zig

"""

add_newline = true

[directory]
format = "[$path]($style)[$read_only]($read_only_style)"
style = "bold #b36d43"
read_only = " RO"
read_only_style = "bold #ff3333"
truncation_length = 3
truncate_to_repo = false

[git_branch]
format = "*[$branch]($style)"
style = "#685742"
symbol = ""

[git_status]
format = ' [\[$all_status$ahead_behind\]]($style) '
style = "#ffaa00"
conflicted = "!"
ahead = "+"
behind = "-"
diverged = "+-"
untracked = "?"
stashed = "*"
modified = "~"
staged = "+"
renamed = "r"
deleted = "x"

[nix_shell]
format = "[$symbol$state( $name)]($style) "
symbol = "пӢң "
style = "#685742"

[username]
format = "[$user]($style)"
style_user = "bold #5f7a5f"
style_root = "bold #ff3333"
show_always = true

[hostname]
format = "[@$hostname]($style)"
style = "bold #5f7a5f"
ssh_only = true

[daml]
format = "[$symbol](#BFCAA3)[($version)]($style) "
symbol = "оҠҠ "
