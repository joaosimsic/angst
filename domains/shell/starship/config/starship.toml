format = """
$directory $git_branch$git_status$all
$character"""

add_newline = true

[directory]
format = "[$path]($style)[$read_only]($read_only_style)"
style = "bold #c8c093"
read_only = " RO"
read_only_style = "bold #c4746e"
truncation_length = 3
truncate_to_repo = false

[git_branch]
format = "on [$branch]($style)"
style = "#a292a3"
symbol = ""

[git_status]
format = " [$all_status$ahead_behind]($style)"
style = "#c4b28a"
conflicted = "!"
ahead = "+"
behind = "-"
diverged = "+-"
untracked = "?"
stashed = "*"
modified = "~"
staged = ">"
renamed = "r"
deleted = "x"

# vimcmd_symbol is ignored when STARSHIP_SHELL=nu; Nushell handles vi mode via
# PROMPT_INDICATOR_VI_INSERT / PROMPT_INDICATOR_VI_NORMAL in env.nu.
[character]
success_symbol = "[>](bold #8a9a7b)"
error_symbol = "[>](bold #c4746e)"
vimcmd_symbol = "[<](bold #c5c9c5)"

[username]
format = "[$user]($style) "
style_user = "bold #c8c093"
style_root = "bold #c4746e"
show_always = false

[hostname]
format = "[@$hostname]($style) "
style = "bold #a292a3"
ssh_only = true

[nodejs]
format = "[$symbol($version)]($style) "
symbol = "node "
style = "#a292a3"

[python]
format = "[$symbol$version]($style) "
symbol = "py "
style = "#a292a3"

[rust]
format = "[$symbol($version)]($style) "
symbol = "rs "
style = "#a292a3"

[golang]
format = "[$symbol($version)]($style) "
symbol = "go "
style = "#a292a3"

[java]
format = "[$symbol($version)]($style) "
symbol = "java "
style = "#a292a3"

[php]
format = "[$symbol($version)]($style) "
symbol = "php "
style = "#a292a3"

[ruby]
format = "[$symbol($version)]($style) "
symbol = "rb "
style = "#a292a3"

[nix_shell]
format = "[$symbol$state]($style) "
symbol = "nix "
style = "#a292a3"

[docker_context]
format = "[$symbol$context]($style) "
symbol = "docker "
style = "#a292a3"

[package]
format = "[$symbol$version]($style) "
symbol = "pkg "
style = "#a292a3"
