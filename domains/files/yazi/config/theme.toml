[mode]
normal_main = { bg = "#b1bac4", fg = "#0d1117", bold = true }
normal_alt  = { fg = "#b1bac4", bg = "#0d1117" }

[filetype]
rules = [
    { mime = "image/*", fg = "#58a6ff" },
    { mime = "video/*", fg = "#d29922" },
    { mime = "inode/empty", fg = "#484f58" },
    { url = "*/", fg = "#3fb950" }
]

[overall]
bg = "#010409"

