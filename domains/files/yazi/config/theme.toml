[mode]
normal_main = { bg = "#eeeeee", fg = "#2b2b2b", bold = true }
normal_alt  = { fg = "#eeeeee", bg = "#2b2b2b" }

[filetype]
rules = [
    { mime = "image/*", fg = "#608f60" },        
    { mime = "video/*", fg = "#a07aaa" },       
    { mime = "inode/empty", fg = "#5e5e5e" },  
    { url = "*/", fg = "#6290a0" }            
]

[overall]
bg = "#222222"
