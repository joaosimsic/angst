[mode]
normal_main = { bg = "#d7c483", fg = "#2b2b2b", bold = true }
normal_alt  = { fg = "#d7c483", bg = "#2b2b2b" }

[filetype]
rules = [
    { mime = "image/*", fg = "#5f875f" },
    { mime = "video/*", fg = "#bb7744" },
    { mime = "inode/empty", fg = "#666666" },
    { url = "*/", fg = "#78824b" }
]

[overall]
bg = "#222222"

