[mode]
normal_main = { bg = "#99d1ce", fg = "#0c1014", bold = true }
normal_alt  = { fg = "#99d1ce", bg = "#0c1014" }

[filetype]
rules = [
    { mime = "image/*", fg = "#2aa889" },
    { mime = "video/*", fg = "#edb443" },
    { mime = "inode/empty", fg = "#4e5166" },
    { url = "*/", fg = "#33859e" }
]

[overall]
bg = "#0c1014"

