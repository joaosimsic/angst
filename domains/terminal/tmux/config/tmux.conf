# tmux config — generated by angst

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

set -g status-style "bg=#58a6ff,fg=#010409"
set -g status-left ""
set -g status-right "#[bg=#58a6ff,fg=#010409] %H:%M "
set -g status-right-length 100
set -g status-left-length 100
set -g status-interval 5

set -g window-status-current-style "bg=#ff7b72,fg=#010409,bold"
set -g window-status-style "bg=#58a6ff,fg=#010409"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

set -g pane-border-style "fg=#58a6ff"
set -g pane-active-border-style "fg=#ff7b72"

set -g message-style "bg=#58a6ff,fg=#010409"
set -g message-command-style "bg=#58a6ff,fg=#010409"

set -g mode-style "bg=#d29922,fg=#010409"

set -g mouse on
set -g history-limit 50000
set -g base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g detach-on-destroy off

bind -n M-Left previous-window
bind -n M-Right next-window
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

